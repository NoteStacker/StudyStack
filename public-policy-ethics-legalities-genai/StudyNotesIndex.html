<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study notes · generative AI ethics</title>
    <!-- Inter font & font awesome -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* consistent with main course palette */
            --bg-light: #f5f7fc;
            --bg-dark: #0b0d15;
            --surface-light: rgba(255, 255, 255, 0.75);
            --surface-dark: rgba(18, 22, 36, 0.8);
            --card-light: rgba(255, 255, 255, 0.6);
            --card-dark: rgba(25, 30, 44, 0.7);
            --border-light: rgba(0, 20, 50, 0.1);
            --border-dark: rgba(120, 140, 200, 0.2);
            --text-primary-light: #111827;
            --text-secondary-light: #2d3a4f;
            --text-primary-dark: #edf2fb;
            --text-secondary-dark: #b2c9f0;
            --accent-primary: #4f46e5;
            --accent-soft: #818cf8;
            --accent-flash: #c084fc;
            --shadow-light: 0 20px 35px -10px rgba(0, 0, 0, 0.08), 0 0 0 1px rgba(255,255,255,0.7) inset;
            --shadow-dark: 0 25px 40px -12px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(255,255,255,0.05) inset;
            --hover-bg-light: rgba(79, 70, 229, 0.04);
            --hover-bg-dark: rgba(129, 140, 248, 0.08);
            --topic-bg-light: rgba(255, 255, 255, 0.5);
            --topic-bg-dark: rgba(30, 35, 55, 0.5);
        }

        body.dark {
            --bg: var(--bg-dark);
            --surface: var(--surface-dark);
            --card-bg: var(--card-dark);
            --border: var(--border-dark);
            --text-primary: var(--text-primary-dark);
            --text-secondary: var(--text-secondary-dark);
            --shadow: var(--shadow-dark);
            --hover-bg: var(--hover-bg-dark);
            --topic-bg: var(--topic-bg-dark);
        }

        body:not(.dark) {
            --bg: var(--bg-light);
            --surface: var(--surface-light);
            --card-bg: var(--card-light);
            --border: var(--border-light);
            --text-primary: var(--text-primary-light);
            --text-secondary: var(--text-secondary-light);
            --shadow: var(--shadow-light);
            --hover-bg: var(--hover-bg-light);
            --topic-bg: var(--topic-bg-light);
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            transition: background 0.3s ease, color 0.2s;
            min-height: 100vh;
            padding: 2rem;
            line-height: 1.5;
            position: relative;
        }

        /* animated background */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(79, 70, 229, 0.1) 0%, transparent 35%),
                radial-gradient(circle at 90% 70%, rgba(192, 132, 252, 0.08) 0%, transparent 40%);
            pointer-events: none;
            z-index: -1;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* header */
        .page-header {
            background: var(--surface);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 2rem;
            padding: 1.5rem 2rem;
            margin-bottom: 2.5rem;
            box-shadow: var(--shadow);
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .back-link {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            background: var(--card-bg);
            border: 1px solid var(--border);
            transition: 0.2s;
        }

        .back-link:hover {
            background: var(--accent-primary);
            color: white;
            border-color: var(--accent-primary);
        }

        .header-title h1 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(130deg, #4f46e5, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .header-title p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-top: 0.2rem;
        }

        /* theme toggle */
        .theme-toggle-mini {
            display: flex;
            gap: 0.3rem;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 2rem;
            padding: 0.2rem;
        }

        .theme-btn-mini {
            border: none;
            background: transparent;
            width: 2.5rem;
            height: 2.5rem;
            border-radius: 2rem;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 1rem;
            transition: 0.15s;
        }

        .theme-btn-mini.active {
            background: var(--accent-primary);
            color: white;
        }

        /* search section */
        .search-section {
            margin-bottom: 2.5rem;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .search-wrapper {
            background: var(--surface);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 3rem;
            padding: 0.3rem 0.3rem 0.3rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: var(--shadow);
        }

        .search-wrapper i {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        .search-wrapper input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 1rem 0;
            font-size: 1rem;
            color: var(--text-primary);
            outline: none;
        }

        .search-wrapper input::placeholder {
            color: var(--text-secondary);
            opacity: 0.6;
        }

        .search-clear {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 2rem;
            padding: 0.6rem 1.2rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: 0.15s;
            font-size: 0.9rem;
        }

        .search-clear:hover {
            background: var(--accent-primary);
            color: white;
            border-color: var(--accent-primary);
        }

        /* stats bar */
        .stats-bar {
            background: var(--surface);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 2rem;
            padding: 1rem 2rem;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .topic-count {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            color: var(--text-secondary);
        }

        .topic-count span {
            font-weight: 700;
            color: var(--accent-primary);
            font-size: 1.3rem;
        }

        /* topics grid - redesigned for full title visibility */
        .topics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.2rem;
            margin: 2rem 0;
        }

        .topic-item {
            background: var(--topic-bg);
            backdrop-filter: blur(8px);
            border: 1px solid var(--border);
            border-radius: 1.5rem;
            padding: 1.5rem;
            display: flex;
            align-items: flex-start;
            gap: 1.2rem;
            transition: all 0.25s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            min-height: 100px;
        }

        .topic-item:hover {
            transform: translateY(-3px);
            background: var(--surface);
            border-color: var(--accent-primary);
            box-shadow: 0 15px 30px -12px rgba(79, 70, 229, 0.3);
        }

        /* consistent icon for all topics */
        .topic-icon {
            width: 3rem;
            height: 3rem;
            background: linear-gradient(135deg, rgba(79, 70, 229, 0.1), rgba(192, 132, 252, 0.1));
            border-radius: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent-primary);
            font-size: 1.3rem;
            transition: 0.2s;
            flex-shrink: 0;
        }

        .topic-item:hover .topic-icon {
            background: linear-gradient(135deg, rgba(79, 70, 229, 0.2), rgba(192, 132, 252, 0.2));
            transform: scale(1.05);
        }

        .topic-content {
            flex: 1;
            min-width: 0; /* prevents flex overflow */
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .topic-title {
            font-weight: 600;
            font-size: 1.1rem;
            color: var(--text-primary);
            line-height: 1.4;
            word-wrap: break-word;
            white-space: normal;
            overflow: visible;
            display: block;
            width: 100%;
        }

        .topic-meta {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .topic-meta i {
            font-size: 0.4rem;
            color: var(--accent-primary);
        }

        .topic-link {
            color: var(--text-secondary);
            text-decoration: none;
            width: 2.5rem;
            height: 2.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 2rem;
            transition: 0.2s;
            flex-shrink: 0;
            background: var(--card-bg);
            border: 1px solid var(--border);
            margin-left: auto;
            align-self: center;
        }

        .topic-item:hover .topic-link {
            background: var(--accent-primary);
            color: white;
            border-color: var(--accent-primary);
        }

        /* no results */
        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-secondary);
            background: var(--surface);
            border-radius: 2rem;
            border: 1px solid var(--border);
        }

        .no-results i {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .footer-note {
            text-align: center;
            margin-top: 3rem;
            font-size: 0.9rem;
            color: var(--text-secondary);
            opacity: 0.7;
        }

        @media (max-width: 700px) {
            body { padding: 1rem; }
            .page-header { flex-direction: column; align-items: flex-start; gap: 1rem; }
            .topics-grid { grid-template-columns: 1fr; }
            .topic-item { padding: 1.2rem; }
        }

        @media (max-width: 450px) {
            .topic-item {
                flex-wrap: wrap;
            }
            .topic-link {
                margin-left: 0;
                width: 100%;
                margin-top: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- header -->
        <div class="page-header">
            <div class="header-left">
                <a href="CoursePage.html" class="back-link">
                    <i class="fas fa-arrow-left"></i> Back
                </a>
                <div class="header-title">
                    <h1>Study notes</h1>
                    <p>Generative AI · ethics · policy · law</p>
                </div>
            </div>
            <div class="theme-toggle-mini" id="themeToggleGroup">
                <button class="theme-btn-mini" id="themeLight" title="Light"><i class="fas fa-sun"></i></button>
                <button class="theme-btn-mini" id="themeDark" title="Dark"><i class="fas fa-moon"></i></button>
            </div>
        </div>

        <!-- stats bar -->
        <div class="stats-bar">
            <div class="topic-count">
                <i class="fas fa-layer-group" style="color: var(--accent-primary);"></i>
                <span id="topicCount">0</span> topics
            </div>
            <div style="color: var(--text-secondary); font-size: 0.9rem;">
                <i class="fas fa-arrow-right" style="margin-right: 0.5rem;"></i> Click any card to open notes
            </div>
        </div>

        <!-- search -->
        <div class="search-section">
            <div class="search-wrapper">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Search topics... (e.g., 'bias', 'copyright', 'EU Act')">
                <span class="search-clear" id="clearSearch"><i class="fas fa-times"></i> Clear</span>
            </div>
        </div>

        <!-- topics grid -->
        <div class="topics-grid" id="topicsGrid">
            <!-- populated by JS -->
        </div>

        <div class="footer-note">
            <i class="fas fa-file-lines" style="color: var(--accent-primary);"></i> Each card shows a topic
        </div>
    </div>

    <script>
    (function() {
        // Theme handling (keep this exactly as is)
        const body = document.body;
        const lightBtn = document.getElementById('themeLight');
        const darkBtn = document.getElementById('themeDark');

        function applyTheme(theme) {
            if (theme === 'dark') {
                body.classList.add('dark');
                lightBtn.classList.remove('active');
                darkBtn.classList.add('active');
                localStorage.setItem('theme', 'dark');
            } else {
                body.classList.remove('dark');
                darkBtn.classList.remove('active');
                lightBtn.classList.add('active');
                localStorage.setItem('theme', 'light');
            }
        }

        const stored = localStorage.getItem('theme');
        if (stored === 'dark') applyTheme('dark');
        else if (stored === 'light') applyTheme('light');
        else applyTheme('light');

        lightBtn.addEventListener('click', () => applyTheme('light'));
        darkBtn.addEventListener('click', () => applyTheme('dark'));

        // Comprehensive topic list
        const topics = [
            "Foundations of AI Ethics and Policy: Study Guide with 7 Systems Considerations",
            "Societal Considerations of AI, IndiaAI Mission & GenAI for Product Managers",
	    "Mastering the NIST AI RMF: From GOVERN to MANAGE"
        ];

        // ===== Map each topic to its page URL =====
        // Replace these URLs with the actual paths to your notes pages
        const topicPages = {
            "Foundations of AI Ethics and Policy: Study Guide with 7 Systems Considerations": "lecture 1 and 2.html",
            "Societal Considerations of AI, IndiaAI Mission & GenAI for Product Managers": "lecture 3.html",
	    "Mastering the NIST AI RMF: From GOVERN to MANAGE": "./NIST/NIST_1.html"
        };

        // Function to navigate to topic page (OPENS IN NEW TAB)
        function navigateToTopic(title) {
            const pageUrl = topicPages[title];
            if (pageUrl) {
                window.open(pageUrl, '_blank'); // Opens in new tab
            } else {
                // Fallback if URL not found
                console.error('No page URL found for topic:', title);
                alert('Page not yet created for: ' + title);
            }
        }

        // Render grid
        const grid = document.getElementById('topicsGrid');
        const countSpan = document.getElementById('topicCount');
        
        function renderTopics(filteredTopics = topics) {
            let html = '';
            filteredTopics.forEach((title, index) => {
                html += `
                    <div class="topic-item" data-topic-title="${title.toLowerCase()}" data-topic-index="${index}">
                        <div class="topic-icon">
                            <i class="fas fa-file-lines"></i>
                        </div>
                        <div class="topic-content">
                            <div class="topic-title">${title}</div>
                            <div class="topic-meta">
                                <i class="fas fa-circle"></i>
                                <span>Study notes</span>
                            </div>
                        </div>
                        <a href="#" class="topic-link" data-topic-title="${title}">
                            <i class="fas fa-arrow-right"></i>
                        </a>
                    </div>
                `;
            });
            grid.innerHTML = html;
            countSpan.innerText = filteredTopics.length;
            
            // Add click handlers AFTER rendering
            attachClickHandlers();
        }

        // Attach click handlers to all topic elements
        function attachClickHandlers() {
            // Handle clicks on the topic-link (arrow button)
            document.querySelectorAll('.topic-link').forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    const title = link.getAttribute('data-topic-title');
                    navigateToTopic(title);
                });
            });

            // Handle clicks on the entire topic-item (card)
            document.querySelectorAll('.topic-item').forEach(item => {
                item.addEventListener('click', (e) => {
                    // Don't navigate if clicking on the link (already handled above)
                    if (e.target.closest('.topic-link')) {
                        return;
                    }
                    
                    // Get the title from the DOM
                    const titleElement = item.querySelector('.topic-title');
                    if (titleElement) {
                        const title = titleElement.innerText;
                        navigateToTopic(title);
                    }
                });
            });
        }

        // Initial render
        renderTopics();

        // Search functionality
        const searchInput = document.getElementById('searchInput');
        const clearBtn = document.getElementById('clearSearch');

        function filterTopics() {
            const term = searchInput.value.toLowerCase().trim();
            
            if (term === '') {
                renderTopics(topics);
                return;
            }

            const filtered = topics.filter(title => 
                title.toLowerCase().includes(term)
            );

            renderTopics(filtered);

            // Show no results message if needed
            if (filtered.length === 0) {
                grid.innerHTML = `
                    <div class="no-results">
                        <i class="fas fa-search"></i>
                        <h3>No topics found</h3>
                        <p>Try adjusting your search term</p>
                    </div>
                `;
            }
        }

        searchInput.addEventListener('input', filterTopics);
        clearBtn.addEventListener('click', () => {
            searchInput.value = '';
            filterTopics();
        });
        
    })();
</script>
</body>
</html>
