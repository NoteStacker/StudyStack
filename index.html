<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>GenAI and PM Study Hub</title>
    <!-- Font & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Light/Dark mode variables */
        :root {
            /* Dark mode (default) */
            --bg-primary: #0a0c1a;
            --bg-secondary: #14182f;
            --bg-card: rgba(20, 25, 45, 0.9);
            --text-primary: #f3f4ff;
            --text-secondary: #a5b4fc;
            --border-color: rgba(255,255,255,0.1);
            --accent-1: #6366f1;
            --accent-2: #8b5cf6;
            --accent-3: #d946ef;
            --hover-bg: rgba(99, 102, 241, 0.2);
            --shadow-color: rgba(0,0,0,0.3);
            --code-bg: rgba(0,0,0,0.3);
            --input-bg: rgba(0,0,0,0.3);
            --card-hover: rgba(99, 102, 241, 0.15);
            --nav-bg: rgba(10, 15, 30, 0.8);
        }

        /* Light mode */
        [data-theme="light"] {
            --bg-primary: #f0f2fa;
            --bg-secondary: #ffffff;
            --bg-card: rgba(255, 255, 255, 0.95);
            --text-primary: #1a1f3a;
            --text-secondary: #4f52b0;
            --border-color: rgba(99, 102, 241, 0.2);
            --accent-1: #4f46e5;
            --accent-2: #7c3aed;
            --accent-3: #c026d3;
            --hover-bg: rgba(79, 70, 229, 0.1);
            --shadow-color: rgba(0,0,0,0.1);
            --code-bg: #eef2ff;
            --input-bg: #ffffff;
            --card-hover: rgba(79, 70, 229, 0.08);
            --nav-bg: rgba(255, 255, 255, 0.8);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 1rem;
            transition: background-color 0.3s ease, color 0.2s ease;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0.5rem;
        }

        /* Navigation Bar */
        .navbar {
            background: var(--nav-bg);
            backdrop-filter: blur(10px);
            border-radius: 1.5rem;
            padding: 0.8rem 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid var(--border-color);
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 10px 30px var(--shadow-color);
        }

        .nav-links {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .nav-link {
            padding: 0.6rem 1.2rem;
            border-radius: 2rem;
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border: 1px solid transparent;
        }

        .nav-link:hover {
            background: var(--hover-bg);
            border-color: var(--accent-1);
            color: var(--accent-1);
        }

        .nav-link i {
            font-size: 1rem;
        }

        /* Social Media Links */
        .social-links {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .social-link {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--code-bg);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: all 0.2s;
            font-size: 1.2rem;
        }

        .social-link:hover {
            background: var(--accent-1);
            color: white;
            border-color: var(--accent-1);
            transform: translateY(-3px);
        }

        /* Header with theme toggle */
        .header {
            background: var(--bg-secondary);
            backdrop-filter: blur(10px);
            border-radius: 1.5rem;
            padding: 1rem 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid var(--border-color);
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 10px 30px var(--shadow-color);
        }

        .title-section {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        h1 {
            font-size: clamp(1.5rem, 5vw, 2.2rem);
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-1), var(--accent-3));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* Theme toggle */
        .theme-toggle {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 3rem;
            padding: 0.3rem;
            display: flex;
            gap: 0.3rem;
        }

        .theme-btn {
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.3rem;
            transition: all 0.2s;
        }

        .theme-btn.active {
            background: var(--accent-1);
            color: white;
        }

        /* Semester navigation */
        .semester-bar {
            display: flex;
            gap: 0.8rem;
            margin: 1.5rem 0;
            overflow-x: auto;
            padding: 0.5rem 0.2rem;
            scrollbar-width: thin;
            -webkit-overflow-scrolling: touch;
        }

        .sem-btn {
            padding: 0.8rem 1.8rem;
            border-radius: 3rem;
            font-weight: 600;
            font-size: clamp(0.9rem, 4vw, 1.1rem);
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
            backdrop-filter: blur(5px);
            flex: 0 0 auto;
        }

        .sem-btn.active {
            background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
            color: white;
            border-color: transparent;
            box-shadow: 0 10px 20px -10px var(--accent-1);
        }

        /* Search */
        .search-container {
            margin: 1.5rem 0;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 1rem 1rem 1rem 3rem;
            border-radius: 3rem;
            border: 1px solid var(--border-color);
            background: var(--input-bg);
            color: var(--text-primary);
            font-size: 1rem;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent-1);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        .search-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
        }

        .search-stats {
            margin-top: 0.5rem;
            font-size: 0.9rem;
            color: var(--text-secondary);
            text-align: right;
        }

        /* Subjects grid */
        .subjects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(min(100%, 320px), 1fr));
            gap: 1.5rem;
            margin: 1.5rem 0;
        }

        /* Clean subject cards */
        .subject-card {
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            border-radius: 1.8rem;
            padding: 1.8rem 1.5rem;
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            position: relative;
            overflow: hidden;
        }

        .subject-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent-2);
            box-shadow: 0 20px 30px -12px var(--accent-1);
            background: var(--card-hover);
        }

        .subject-code {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--accent-2);
            letter-spacing: 0.3px;
            text-transform: uppercase;
            margin-bottom: 0.2rem;
        }

        .subject-title {
            font-size: clamp(1.2rem, 4vw, 1.4rem);
            font-weight: 700;
            line-height: 1.4;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        /* Professor info with user icon */
        .prof-info {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            background: var(--code-bg);
            padding: 0.6rem 1rem 0.6rem 0.6rem;
            border-radius: 3rem;
            width: fit-content;
            border: 1px solid var(--border-color);
        }

        .prof-icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: white;
            font-size: 1rem;
        }

        .prof-name {
            font-size: 1rem;
            font-weight: 500;
            color: var(--text-primary);
        }

        /* Explore button */
        .explore-btn {
            margin-top: 0.8rem;
            padding: 0.9rem 1.5rem;
            border-radius: 3rem;
            background: transparent;
            border: 2px solid var(--accent-1);
            color: var(--accent-1);
            font-weight: 600;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            text-decoration: none;
        }

        .explore-btn:hover {
            background: var(--accent-1);
            color: white;
            gap: 1.2rem;
        }

        .explore-btn i {
            font-size: 0.9rem;
            transition: transform 0.2s;
        }

        .explore-btn:hover i {
            transform: translateX(4px);
        }

        /* Loading state */
        .loading {
            text-align: center;
            padding: 4rem;
            color: var(--text-secondary);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-color);
            border-top-color: var(--accent-1);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 1rem auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* No results state */
        .no-results {
            text-align: center;
            padding: 4rem 2rem;
            background: var(--bg-card);
            border-radius: 2rem;
            border: 1px solid var(--border-color);
        }

        .no-results i {
            font-size: 3rem;
            color: var(--accent-2);
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        /* Footer with social */
        .footer {
            margin-top: 3rem;
            padding: 2rem 1.5rem;
            background: var(--bg-secondary);
            border-radius: 1.5rem;
            border: 1px solid var(--border-color);
            display: flex;
            flex-wrap: wrap;
            gap: 2rem;
            align-items: center;
            justify-content: space-between;
        }

        .footer-info {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .footer-info i {
            color: var(--accent-2);
            margin: 0 0.2rem;
        }

        .footer-social {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .footer-social .social-link {
            width: 45px;
            height: 45px;
            font-size: 1.3rem;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .navbar {
                flex-direction: column;
                align-items: stretch;
            }
            
            .nav-links {
                justify-content: center;
            }
            
            .social-links {
                justify-content: center;
            }
            
            .header {
                padding: 1rem;
            }
            
            .subject-card {
                padding: 1.5rem;
            }
            
            .footer {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>
<body data-theme="dark">
    <div class="container">
        <!-- Navigation Bar with future links -->
        <nav class="navbar">
            <div class="nav-links">
                <a href="#" class="nav-link" onclick="return false;">
                    <i class="fas fa-home"></i> Home
                </a>
                <a href="#" class="nav-link" onclick="alert('Resources page coming soon!')">
                    <i class="fas fa-book"></i> Resources
                </a>
                <a href="#" class="nav-link" onclick="alert('Assignments page coming soon!')">
                    <i class="fas fa-tasks"></i> Assignments
                </a>
                <a href="#" class="nav-link" onclick="alert('Projects page coming soon!')">
                    <i class="fas fa-project-diagram"></i> Projects
                </a>
                <a href="#" class="nav-link" onclick="alert('Calendar coming soon!')">
                    <i class="fas fa-calendar"></i> Calendar
                </a>
                <a href="#" class="nav-link" onclick="alert('Study groups coming soon!')">
                    <i class="fas fa-users"></i> Study Groups
                </a>
            </div>
            
            <!-- Social Media Links in Nav -->
            <div class="social-links">
                <a href="#" class="social-link" target="_blank" title="GitHub"><i class="fab fa-github"></i></a>
                <a href="#" class="social-link" target="_blank" title="Twitter"><i class="fab fa-twitter"></i></a>
                <a href="#" class="social-link" target="_blank" title="LinkedIn"><i class="fab fa-linkedin-in"></i></a>
                <a href="#" class="social-link" target="_blank" title="Discord"><i class="fab fa-discord"></i></a>
                <a href="#" class="social-link" target="_blank" title="YouTube"><i class="fab fa-youtube"></i></a>
            </div>
        </nav>

        <!-- Header with theme toggle -->
        <div class="header">
            <div class="title-section">
                <h1><i class="fas fa-brain"></i> GenAI and Product Management Study Explorer</h1>
            </div>
            <div class="theme-toggle">
                <button class="theme-btn active" onclick="setTheme('dark')">
                    <i class="fas fa-moon"></i> Dark
                </button>
                <button class="theme-btn" onclick="setTheme('light')">
                    <i class="fas fa-sun"></i> Light
                </button>
            </div>
        </div>

        <!-- Search -->
        <div class="search-container">
            <i class="fas fa-search search-icon"></i>
            <input type="text" class="search-input" id="globalSearch" 
                   placeholder="Search by subject code, title, or professor..." 
                   oninput="filterSubjects(this.value)">
        </div>
        <div class="search-stats" id="searchStats"></div>

        <!-- Semester Navigation -->
        <div class="semester-bar" id="semesterBar">
            <button class="sem-btn active" data-sem="1">Semester I</button>
            <button class="sem-btn" data-sem="2">Semester II</button>
            <button class="sem-btn" data-sem="3">Semester III</button>
            <button class="sem-btn" data-sem="4">Semester IV</button>
        </div>

        <!-- Subjects Container -->
        <div id="subjectsContainer">
            <div class="loading">
                <div class="spinner"></div>
                Loading your study materials...
            </div>
        </div>

        
    </div>

    <script>
        // Theme management
        function setTheme(theme) {
            document.body.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            
            // Update active button
            document.querySelectorAll('.theme-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.innerHTML.includes(theme === 'dark' ? 'moon' : 'sun')) {
                    btn.classList.add('active');
                }
            });
            
          
        }

        // Load saved theme
        const savedTheme = localStorage.getItem('theme') || 'dark';
        setTheme(savedTheme);

        // Subject data - hardcoded directly
        const subjectsData = {
            '1': {
                name: 'Semester I',
                subjects: [
                    {
                        code: 'MB-GAI-501 (3-0-2-4)',
                        title: 'Foundations of AI models for Product Management',
                        professor: 'Dr.Mayank Lovanshi'
                    },
                    {
                        code: 'MB-GAI-503 (3-0-0-3)',
                        title: 'Generative AI Communication Strategy',
                        professor: 'Dr.'
                    },
                    {
                        code: 'MB-GAI-504 (3-0-0-3)',
                        title: 'Managing Digital Transformation',
                        professor: 'Prof. Rajeshwar Singh'
                    },
                    {
                        code: 'MB-GAI-505 (3-1-0-4)',
                        title: 'Public Policy, Ethics & Legalities in Generative AI',
                        professor: 'Dr. Ashish Karan',
		 	page: 'public-policy-ethics-legalities-genai/CoursePage.html'
                    },
                    {
                        code: 'MB-GAI-506 (3-1-0-4)',
                        title: 'ML Algorithms for AI driven Business',
                        professor: 'Dr. T. Bannerjee'
                    },
                    {
                        code: 'MB-GAI-502',
                        title: 'Organizational Behaviour and Design',
                        professor: 'Dr. Shrabani B. Bhattacharjee'
                    }
                ]
            },
            '2': {
                name: 'Semester II',
                subjects: [
                    {
                        code: 'MB-GAI-601 (3-0-2-4)',
                        title: 'Advanced AI Product Strategy',
                        professor: 'Dr. P. Kumar'
                    },
                    {
                        code: 'MB-GAI-602 (3-0-0-3)',
                        title: 'AI Ethics & Governance',
                        professor: 'Prof. R. Sharma'
                    },
                    {
                        code: 'MB-GAI-603 (3-0-0-3)',
                        title: 'Deep Learning for Business',
                        professor: 'Dr. A. Kapoor'
                    }
                ]
            },
            '3': {
                name: 'Semester III',
                subjects: [
                    {
                        code: 'MB-GAI-701 (3-0-2-4)',
                        title: 'AI Implementation & Scaling',
                        professor: 'Dr. M. Sharma'
                    },
                    {
                        code: 'MB-GAI-702 (3-0-0-3)',
                        title: 'Responsible AI',
                        professor: 'Prof. N. Reddy'
                    }
                ]
            },
            '4': {
                name: 'Semester IV',
                subjects: [
                    {
                        code: 'MB-GAI-801 (3-0-2-4)',
                        title: 'Capstone AI Project',
                        professor: 'Prof. R. Verma'
                    }
                ]
            }
        };

        // Render subjects
        function renderSubjects(semester = '1', searchQuery = '') {
            const container = document.getElementById('subjectsContainer');
            const semData = subjectsData[semester];
            const searchStats = document.getElementById('searchStats');
            
            if (!semData || !semData.subjects.length) {
                container.innerHTML = '<div class="no-results"><i class="fas fa-folder-open"></i><h3>No subjects yet</h3></div>';
                searchStats.textContent = '';
                return;
            }

            // Filter subjects based on search
            let filteredSubjects = semData.subjects;
            if (searchQuery.trim()) {
                const query = searchQuery.toLowerCase();
                filteredSubjects = semData.subjects.filter(subject => 
                    subject.title.toLowerCase().includes(query) ||
                    subject.code.toLowerCase().includes(query) ||
                    subject.professor.toLowerCase().includes(query)
                );
            }

            // Update search stats
            if (searchQuery.trim()) {
                searchStats.textContent = `Found ${filteredSubjects.length} of ${semData.subjects.length} subjects`;
            } else {
                searchStats.textContent = `${semData.subjects.length} subjects`;
            }

            if (filteredSubjects.length === 0) {
                container.innerHTML = `
                    <div class="no-results">
                        <i class="fas fa-search"></i>
                        <h3>No matches found</h3>
                        <p>Try different search terms</p>
                    </div>
                `;
                return;
            }

            let html = '<div class="subjects-grid">';
            
            filteredSubjects.forEach((subject, idx) => {
                // Get original index for navigation
                const originalIdx = semData.subjects.findIndex(s => s.code === subject.code);
                const profInitial = subject.professor.charAt(0);
                
                html += `
                    <div class="subject-card">
                        <div class="subject-code">${subject.code}</div>
                        <div class="subject-title">${subject.title}</div>
                        
                        <div class="prof-info">
                            <span class="prof-icon">${profInitial}</span>
                            <span class="prof-name">${subject.professor}</span>
                        </div>
                        
                        <button class="explore-btn" onclick="exploreSubject('${semester}', ${originalIdx})">
                            <span>Explore Subject</span>
                            <i class="fas fa-arrow-right"></i>
                        </button>
                    </div>
                `;
            });
            
            html += '</div>';
            container.innerHTML = html;
        }

        // Navigate to subject page (to be created later)
        function exploreSubject(semester, subjectIdx) {
            const subject = subjectsData[semester].subjects[subjectIdx];
            window.location.href = subject.page;
        }

        // Filter subjects based on search
        function filterSubjects(query) {
            const currentSem = document.querySelector('.sem-btn.active')?.dataset.sem || '1';
            renderSubjects(currentSem, query);
        }

        // Semester switching
        document.querySelectorAll('.sem-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.sem-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                const searchInput = document.getElementById('globalSearch');
                renderSubjects(this.dataset.sem, searchInput.value);
            });
        });

        // Initialize
        setTimeout(() => {
            renderSubjects('1');
        }, 500);
    </script>
</body>
</html>
